<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="USA 26 football trophy icon">
  <defs>
    <linearGradient id="bg" x1="10" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#062b69"/>
      <stop offset="0.52" stop-color="#0b4ea2"/>
      <stop offset="1" stop-color="#c91423"/>
    </linearGradient>
    <linearGradient id="gold" x1="20" y1="7" x2="44" y2="53" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff6bf"/>
      <stop offset="0.22" stop-color="#f7c64b"/>
      <stop offset="0.48" stop-color="#a96f08"/>
      <stop offset="0.7" stop-color="#ffe27d"/>
      <stop offset="1" stop-color="#b87910"/>
    </linearGradient>
    <linearGradient id="shine" x1="24" y1="8" x2="37" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".95"/>
      <stop offset=".4" stop-color="#fff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#001432" flood-opacity=".55"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .spin{transform-origin:32px 15px;animation:spin 8s linear infinite}.pulse{transform-origin:32px 32px;animation:pulse 2.4s ease-in-out infinite}.swoosh{stroke-dasharray:68 16;animation:dash 2.8s linear infinite}.tw{animation:tw 1.7s ease-in-out infinite}.tw2{animation-delay:.65s}.tw3{animation-delay:1.1s}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}@keyframes dash{to{stroke-dashoffset:-84}}@keyframes tw{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.22)}}
    </style>
  </defs>

  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <path d="M7 45c9-5 18-7 27-7 8 0 15 1 23 5" fill="none" stroke="#fff" stroke-width="6" opacity=".2"/>
  <path d="M5 49c12-9 24-11 38-8" fill="none" stroke="#d71920" stroke-width="4.2" stroke-linecap="round" opacity=".95"/>
  <path d="M6 51c15-8 31-10 51-3" class="swoosh" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" opacity=".95"/>
  <path d="M9 53c16-8 30-9 46-3" fill="none" stroke="#06347a" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>

  <g filter="url(#shadow)" class="pulse">
    <path d="M16 16l7-5h18l7 5-4 27H20L16 16z" fill="#08295c" opacity=".88"/>
    <path d="M18 17h28l-4 22H22z" fill="#08295c"/>
    <path d="M22 21h4v16h-4zm8 0h4v16h-4zm8 0h4v16h-4z" fill="#e3192a" opacity=".9"/>
    <path d="M18 17h28" stroke="#fff" stroke-width="2" opacity=".9"/>

    <path d="M19 18c4 7 7 14 11 27h-7c-2-11-5-20-10-28 2-1 4-1 6 1z" fill="url(#gold)"/>
    <path d="M45 18c-4 7-7 14-11 27h7c2-11 5-20 10-28-2-1-4-1-6 1z" fill="url(#gold)"/>
    <path d="M24 15c2 10 4 21 5 33h6c1-12 3-23 5-33-5 4-11 4-16 0z" fill="url(#gold)"/>
    <path d="M28 45h8l2 6H26z" fill="url(#gold)"/>
    <rect x="18" y="50" width="28" height="8" rx="3" fill="#061e49"/>
    <rect x="19" y="51" width="26" height="6" rx="2.5" fill="#092e69" stroke="#f8c64d" stroke-width="1"/>
    <text x="32" y="55.7" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="6.2" font-weight="900" fill="#fff" letter-spacing=".4">USA 26</text>
    <path d="M25 17c2 8 3 17 4 27" fill="none" stroke="url(#shine)" stroke-width="2" opacity=".8"/>
    <path d="M36 17c-1 6-2 14-3 25" fill="none" stroke="#fff" stroke-width="1.2" opacity=".45"/>
  </g>

  <g class="spin" filter="url(#glow)">
    <circle cx="32" cy="15" r="10" fill="url(#gold)" stroke="#7a4b05" stroke-width="1.2"/>
    <path d="M32 8l5 3-2 6h-6l-2-6z" fill="#fff0a8" opacity=".75"/>
    <path d="M32 8v7M27 11l5 4 5-4M29 17l-4 4M35 17l4 4" stroke="#704605" stroke-width="1" opacity=".75"/>
    <path d="M24 13c4-4 10-5 16-2" fill="none" stroke="#fff" stroke-width="1.4" opacity=".75"/>
  </g>

  <g fill="#fff" class="tw">
    <path d="M12 13l1.4 2.9 3.2.5-2.3 2.2.5 3.2-2.8-1.5-2.8 1.5.5-3.2-2.3-2.2 3.2-.5z"/>
  </g>
  <g fill="#fff" class="tw tw2" opacity=".8">
    <path d="M52 15l1.1 2.2 2.4.4-1.7 1.7.4 2.4-2.2-1.1-2.2 1.1.4-2.4-1.7-1.7 2.4-.4z"/>
  </g>
  <g fill="#fff" class="tw tw3" opacity=".75">
    <path d="M54 44l1.2 2.5 2.8.4-2 2 .5 2.8-2.5-1.3-2.5 1.3.5-2.8-2-2 2.8-.4z"/>
  </g>
</svg>